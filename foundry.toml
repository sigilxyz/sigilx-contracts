[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
auto_detect_solc = true
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
    "uniswap-hooks/=lib/uniswap-hooks/",
    "@uniswap/v4-core/=lib/uniswap-hooks/lib/v4-core/",
    "@uniswap/v4-periphery/=lib/uniswap-hooks/lib/v4-periphery/",
    "@chainlink/=lib/chainlink-brownie-contracts/"
]

[profile.default.fuzz]
runs = 512

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
base-sepolia = "${BASE_SEPOLIA_RPC}"

[etherscan]
base-sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }
